<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background-color: #050505; color: #00FF00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
  .canvas-icon { width: 512px; height: 512px; position: relative; border: 4px solid #00FF00; box-sizing: border-box; overflow: hidden; }
  .canvas-icon::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(45deg, #001100, #003300); z-index: -1; }
  .logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 160px; font-weight: bold; text-shadow: 0 0 20px #00FF00; }
  .tagline { position: absolute; bottom: 60px; width: 100%; text-align: center; font-size: 24px; letter-spacing: 4px; }

  .canvas-feature { width: 1024px; height: 500px; position: relative; border: 8px solid #00FF00; box-sizing: border-box; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #003300 0%, #000000 100%); }
  .feature-title { font-size: 100px; font-weight: bold; text-shadow: 0 0 30px #00FF00; text-align: center; }
  .feature-subtitle { font-size: 32px; margin-top: 20px; color: #008F11; text-align: center; text-transform: uppercase; letter-spacing: 8px; }
  .glitch { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, #00FF00 3px, transparent 4px); pointer-events: none; }
</style>
</head>
<body>
  <div id="icon" class="canvas-icon">
    <div class="logo">CW</div>
    <div class="tagline">COREWAR KMP</div>
    <div class="glitch"></div>
  </div>

  <div style="margin-top: 50px;"></div>

  <div id="feature" class="canvas-feature">
    <div class="glitch"></div>
    <div>
      <div class="feature-title">COREWAR KMP</div>
      <div class="feature-subtitle">THE CYBER BATTLE ARENA</div>
    </div>
  </div>
</body>
</html>
